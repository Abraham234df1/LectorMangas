<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Iniciar sesión en la administración de LectorPolar.">
  <title>LectorPolar | Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260722-v16">
  <link rel="stylesheet" href="css/responsive.css?v=20260722-v16">
</head>
<body class="auth-page">
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">LP</span><span><strong>LectorPolar</strong><small>Biblioteca digital</small></span></a>
    <nav class="main-nav"><a href="index.html">Biblioteca</a><a class="button small secondary" href="register.html">Crear cuenta</a></nav>
  </header>

  <main class="auth-layout">
    <section class="panel auth-card">
      <div class="auth-heading">
        <span class="eyebrow">Cuenta existente</span>
        <h1>Iniciar sesión</h1>
        <p>Ingresa tus credenciales para administrar mangas y tomos.</p>
      </div>

      <form id="login-form" class="stack-form">
        <label>Correo electrónico
          <input type="email" name="email" placeholder="ejemplo@correo.com" autocomplete="email" required>
        </label>
        <label>Contraseña
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </label>
        <label class="inline-check"><input id="show-password" type="checkbox"> Mostrar contraseña</label>
        <button class="button primary full" type="submit">Iniciar sesión</button>
      </form>

      <p id="auth-status" class="status-message" hidden></p>
      <div class="auth-separator"><span>¿Primera vez?</span></div>
      <a class="button secondary full" href="register.html">Crear una cuenta</a>
      <p class="field-help auth-demo-access">Administrador inicial: <strong>admin@gmail.com</strong> · <strong>admin123</strong></p>
    </section>
  </main>

  <script src="js/config.js?v=20260722-v15"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/login.js?v=20260722-v15"></script>
</body>
</html>
